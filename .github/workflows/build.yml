name: build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild 7-Taskbar-AutoSort.sln /p:Configuration=${{ matrix.config }} /p:Platform=${{ matrix.platform }} /m /nologo

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 7-Taskbar-AutoSort-${{ matrix.config }}-${{ matrix.platform }}
          path: |
            build/${{ matrix.config }}-${{ matrix.platform }}/7-Taskbar-AutoSort.exe
            build/${{ matrix.config }}-${{ matrix.platform }}/autosort.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          body: |
            Version: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
