name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          $sources = @(
            "inject\inject.c","inject\json_util.c","inject\json_util.h",
            "inject\settings.c","inject\settings.h","inject\tray.c","inject\tray.h",
            "inject\update.c","inject\update.h","inject\version_compare.c","inject\version_compare.h",
            "autosort\autosort_module.c","autosort\autosort_module.h",
            "tests\test_json_util.cpp","tests\test_version_compare.cpp"
          )
          clang-format --dry-run --Werror $sources
        shell: pwsh

  build:
    runs-on: windows-latest
    needs: format-check
    strategy:
      matrix:
        config: [Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Cache submodules
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor/
          key: ${{ runner.os }}-vendor-${{ hashFiles('.gitmodules') }}

      - name: Fetch submodules
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Cache build artifacts
        id: cache
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.c', '**/*.h', '**/*.cpp', '*.sln', '**/*.vcxproj') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Setup MSBuild
        if: steps.cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: msbuild 7-Taskbar-AutoSort.sln /p:Configuration=${{ matrix.config }} /p:Platform=${{ matrix.platform }} /m /nologo

      - name: Run Tests
        run: build\${{ matrix.config }}-${{ matrix.platform }}\tests.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 7-Taskbar-AutoSort-${{ matrix.config }}-${{ matrix.platform }}
          path: |
            build/${{ matrix.config }}-${{ matrix.platform }}/7-Taskbar-AutoSort.exe
            build/${{ matrix.config }}-${{ matrix.platform }}/autosort.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@v4

      - name: Calculate version
        id: version
        run: |
          BASE_VERSION=$(cat VERSION)
          PATCH=$((${{ github.run_number }} - 1))
          VERSION="${BASE_VERSION%.*}.$PATCH"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/**/7-Taskbar-AutoSort.exe
          body: |
            Release v${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}

            The DLL is embedded and self-extracts at runtime.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
