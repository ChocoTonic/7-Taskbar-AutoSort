name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [Release]
        platform: [x64]
    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: packages/
          key: nuget-${{ hashFiles('**/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore 7-Taskbar-AutoSort.sln

      - name: Cache build artifacts
        id: cache
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.c', '**/*.h', '**/*.cpp', '*.sln', '**/*.vcxproj') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Setup MSBuild
        if: steps.cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: msbuild 7-Taskbar-AutoSort.sln /p:Configuration=${{ matrix.config }} /p:Platform=${{ matrix.platform }} /m /nologo

      - name: Run Tests
        run: build\${{ matrix.config }}-${{ matrix.platform }}\tests.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 7-Taskbar-AutoSort-${{ matrix.config }}-${{ matrix.platform }}
          path: |
            build/${{ matrix.config }}-${{ matrix.platform }}/7-Taskbar-AutoSort.exe
            build/${{ matrix.config }}-${{ matrix.platform }}/autosort.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@v4

      - name: Calculate version
        id: version
        run: |
          BASE_VERSION=$(cat VERSION)
          PATCH=$((${{ github.run_number }} - 1))
          VERSION="${BASE_VERSION%.*}.$PATCH"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/**/7-Taskbar-AutoSort.exe
          body: |
            Release v${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}

            The DLL is embedded and self-extracts at runtime.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
